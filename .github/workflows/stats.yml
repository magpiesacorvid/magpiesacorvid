name: Update Stats
on:
  push:
    paths:
      - stats.json
  workflow_dispatch:
permissions:
  contents: write   #  THIS FIXES EXIT 128 pleasepleaspleazs
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Generate stats
        run: python generate_readme.py
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md
          git commit -m "update stats" || exit 0
          git push
